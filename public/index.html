<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager CRUD App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Task Manager</h1>
      <p>Manage your tasks with create, read, update, and delete actions.</p>
    </header>

    <section class="form-section">
      <h2 id="form-title">Add New Task</h2>
      <form id="task-form">
        <div class="field">
          <label for="title">Title *</label>
          <input id="title" name="title" required />
        </div>

        <div class="field">
          <label for="description">Description</label>
          <textarea id="description" name="description"></textarea>
        </div>

        <div class="field">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option>To Do</option>
            <option>In Progress</option>
            <option>Completed</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="submit" id="submit-button">Save Task</button>
          <button type="button" id="cancel-button" class="secondary hidden">Cancel</button>
        </div>
      </form>
    </section>

    <section class="filter-section">
      <div class="filter-group">
        <label for="search">Search</label>
        <input id="search" placeholder="Search by title or description" />
      </div>

      <div class="filter-group">
        <label for="filter-status">Filter</label>
        <select id="filter-status">
          <option value="">All statuses</option>
          <option>To Do</option>
          <option>In Progress</option>
          <option>Completed</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="sort">Sort</label>
        <select id="sort">
          <option value="id">Newest</option>
          <option value="title">Title</option>
          <option value="status">Status</option>
        </select>
      </div>
    </section>

    <section class="tasks-section">
      <h2>Task List</h2>
      <div id="feedback" class="feedback"></div>
      <div class="task-count" id="task-count"></div>
      <table class="tasks-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Description</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tasks-body"></tbody>
      </table>
    </section>
  </div>

  <script>
    const taskForm = document.getElementById('task-form');
    const titleInput = document.getElementById('title');
    const descriptionInput = document.getElementById('description');
    const statusSelect = document.getElementById('status');
    const tasksBody = document.getElementById('tasks-body');
    const feedback = document.getElementById('feedback');
    const taskCount = document.getElementById('task-count');
    const searchInput = document.getElementById('search');
    const filterStatus = document.getElementById('filter-status');
    const sortSelect = document.getElementById('sort');
    const cancelButton = document.getElementById('cancel-button');
    const formTitle = document.getElementById('form-title');
    const submitButton = document.getElementById('submit-button');

    let currentEditId = null;

    async function fetchTasks() {
      const params = new URLSearchParams();
      if (searchInput.value.trim()) params.set('search', searchInput.value.trim());
      if (filterStatus.value) params.set('status', filterStatus.value);
      if (sortSelect.value) params.set('sort', sortSelect.value);

      const response = await fetch(`/api/tasks?${params.toString()}`);
      return response.json();
    }

    function showFeedback(message, type = 'success') {
      feedback.textContent = message;
      feedback.className = `feedback ${type}`;
      if (message) {
        setTimeout(() => { feedback.textContent = ''; feedback.className = 'feedback'; }, 3000);
      }
    }

    function updateTaskCount(count) {
      taskCount.textContent = `${count} task${count === 1 ? '' : 's'} found`;
    }

    function renderTasks(tasks) {
      tasksBody.innerHTML = '';
      updateTaskCount(tasks.length);

      if (tasks.length === 0) {
        tasksBody.innerHTML = '<tr><td colspan="5" class="empty-row">No tasks available.</td></tr>';
        return;
      }

      tasks.forEach(task => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${task.id}</td>
          <td>${task.title}</td>
          <td>${task.description || ''}</td>
          <td>${task.status}</td>
          <td class="actions-cell">
            <button class="small" data-action="edit" data-id="${task.id}">Edit</button>
            <button class="small secondary" data-action="delete" data-id="${task.id}">Delete</button>
          </td>
        `;
        tasksBody.appendChild(row);
      });
    }

    async function loadTasks() {
      const tasks = await fetchTasks();
      renderTasks(tasks);
    }

    async function handleFormSubmit(event) {
      event.preventDefault();
      const payload = {
        title: titleInput.value.trim(),
        description: descriptionInput.value.trim(),
        status: statusSelect.value,
      };

      try {
        const url = currentEditId ? `/api/tasks/${currentEditId}` : '/api/tasks';
        const method = currentEditId ? 'PUT' : 'POST';
        const response = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const result = await response.json();
        if (!response.ok) {
          showFeedback(result.error || (result.errors && result.errors.join(' ')) || 'Unable to save task.', 'error');
          return;
        }

        resetForm();
        loadTasks();
        showFeedback(currentEditId ? 'Task updated successfully.' : 'Task created successfully.');
      } catch (error) {
        showFeedback('Unable to reach the server.', 'error');
      }
    }

    function resetForm() {
      currentEditId = null;
      taskForm.reset();
      statusSelect.value = 'To Do';
      formTitle.textContent = 'Add New Task';
      submitButton.textContent = 'Save Task';
      cancelButton.classList.add('hidden');
    }

    async function handleTaskAction(event) {
      const button = event.target.closest('button');
      if (!button) return;

      const id = button.dataset.id;
      const action = button.dataset.action;

      if (action === 'delete') {
        if (!confirm('Are you sure you want to delete this task?')) return;
        await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
        showFeedback('Task deleted.');
        loadTasks();
      }

      if (action === 'edit') {
        const response = await fetch(`/api/tasks/${id}`);
        if (!response.ok) {
          showFeedback('Unable to load task for editing.', 'error');
          return;
        }
        const task = await response.json();
        currentEditId = task.id;
        titleInput.value = task.title;
        descriptionInput.value = task.description || '';
        statusSelect.value = task.status;
        formTitle.textContent = 'Edit Task';
        submitButton.textContent = 'Update Task';
        cancelButton.classList.remove('hidden');
      }
    }

    function wireEvents() {
      taskForm.addEventListener('submit', handleFormSubmit);
      tasksBody.addEventListener('click', handleTaskAction);
      searchInput.addEventListener('input', loadTasks);
      filterStatus.addEventListener('change', loadTasks);
      sortSelect.addEventListener('change', loadTasks);
      cancelButton.addEventListener('click', resetForm);
    }

    wireEvents();
    loadTasks();
  </script>
</body>
</html>
