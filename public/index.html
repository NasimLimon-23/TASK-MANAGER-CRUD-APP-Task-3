<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager CRUD App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Task Manager</h1>
      <p>Manage your tasks with create, read, update, and delete actions.</p>
      <div id="auth-status" class="auth-status">
        <span id="user-info"></span>
        <button id="logout-button" class="secondary small hidden">Logout</button>
      </div>
      <div id="security-notice" class="security-notice" style="color: #dc2626; font-size: 14px; margin-top: 8px; display: none;">
        ⚠️ Each user sees only their own tasks. Make sure to logout before switching users.
      </div>
    </header>

    <section id="auth-section" class="auth-section">
      <div class="auth-tabs">
        <button id="login-tab" class="tab active">Login</button>
        <button id="register-tab" class="tab">Register</button>
      </div>

      <form id="login-form" class="auth-form">
        <h2>Login</h2>
        <div class="field">
          <label for="login-username">Username *</label>
          <input id="login-username" name="username" required />
        </div>
        <div class="field">
          <label for="login-password">Password *</label>
          <input id="login-password" name="password" type="password" required />
        </div>
        <div class="form-actions">
          <button type="submit">Login</button>
        </div>
      </form>

      <form id="register-form" class="auth-form hidden">
        <h2>Register</h2>
        <div class="field">
          <label for="register-username">Username *</label>
          <input id="register-username" name="username" required />
        </div>
        <div class="field">
          <label for="register-email">Email *</label>
          <input id="register-email" name="email" type="email" required />
        </div>
        <div class="field">
          <label for="register-password">Password *</label>
          <input id="register-password" name="password" type="password" required />
        </div>
        <div class="form-actions">
          <button type="submit">Register</button>
        </div>
      </form>
    </section>

    <section id="tasks-section" class="tasks-section hidden">
      <section class="form-section">
        <h2 id="form-title">Add New Task</h2>
        <form id="task-form">
          <div class="field">
            <label for="title">Title *</label>
            <input id="title" name="title" required />
          </div>

          <div class="field">
            <label for="description">Description</label>
            <textarea id="description" name="description"></textarea>
          </div>

          <div class="field">
            <label for="status">Status</label>
            <select id="status" name="status">
              <option>To Do</option>
              <option>In Progress</option>
              <option>Completed</option>
            </select>
          </div>

          <div class="form-actions">
            <button type="submit" id="submit-button">Save Task</button>
            <button type="button" id="cancel-button" class="secondary hidden">Cancel</button>
          </div>
        </form>
      </section>

      <section class="filter-section">
        <div class="filter-group">
          <label for="search">Search</label>
          <input id="search" placeholder="Search by title or description" />
        </div>

        <div class="filter-group">
          <label for="filter-status">Filter</label>
          <select id="filter-status">
            <option value="">All statuses</option>
            <option>To Do</option>
            <option>In Progress</option>
            <option>Completed</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="sort">Sort</label>
          <select id="sort">
            <option value="id">Newest</option>
            <option value="title">Title</option>
            <option value="status">Status</option>
          </select>
        </div>
      </section>

      <section class="tasks-list-section">
        <h2>Task List</h2>
        <div id="feedback" class="feedback"></div>
        <div class="task-count" id="task-count"></div>
        <table class="tasks-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Description</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tasks-body"></tbody>
        </table>
      </section>
    </section>
  </div>

  <script>
    // Auth elements
    const authSection = document.getElementById('auth-section');
    const tasksSection = document.getElementById('tasks-section');
    const loginTab = document.getElementById('login-tab');
    const registerTab = document.getElementById('register-tab');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const userInfo = document.getElementById('user-info');
    const logoutButton = document.getElementById('logout-button');

    // Task elements
    const taskForm = document.getElementById('task-form');
    const titleInput = document.getElementById('title');
    const descriptionInput = document.getElementById('description');
    const statusSelect = document.getElementById('status');
    const tasksBody = document.getElementById('tasks-body');
    const feedback = document.getElementById('feedback');
    const taskCount = document.getElementById('task-count');
    const searchInput = document.getElementById('search');
    const filterStatus = document.getElementById('filter-status');
    const sortSelect = document.getElementById('sort');
    const cancelButton = document.getElementById('cancel-button');
    const formTitle = document.getElementById('form-title');
    const submitButton = document.getElementById('submit-button');

    let currentEditId = null;
    let currentUser = null;
    let token = localStorage.getItem('token');

    // Enhanced token validation
    function isTokenValid(token) {
      if (!token) return false;
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const now = Math.floor(Date.now() / 1000);
        return payload.exp > now;
      } catch (e) {
        console.warn('Invalid token format');
        return false;
      }
    }

    // Auth functions
    function showAuthSection() {
      authSection.classList.remove('hidden');
      tasksSection.classList.add('hidden');
    }

    function showTasksSection() {
      authSection.classList.add('hidden');
      tasksSection.classList.remove('hidden');
    }

    function updateAuthStatus() {
      const securityNotice = document.getElementById('security-notice');
      if (currentUser) {
        userInfo.textContent = `Welcome, ${currentUser.username}!`;
        logoutButton.classList.remove('hidden');
        securityNotice.style.display = 'block';
        showTasksSection();
        console.log('👤 User authenticated:', currentUser.username);
      } else {
        userInfo.textContent = '';
        logoutButton.classList.add('hidden');
        securityNotice.style.display = 'none';
        showAuthSection();
        console.log('🔒 No user authenticated');
      }
    }

    function logout() {
      console.log('🔐 Logging out user:', currentUser);
      currentUser = null;
      token = null;
      localStorage.removeItem('token');
      localStorage.removeItem('currentUser');
      // Clear any cached data
      tasksBody.innerHTML = '';
      taskCount.textContent = '';
      feedback.textContent = '';
      resetForm();
      console.log('✅ Logout complete');
      updateAuthStatus();
    }

    async function handleAuthSubmit(event, endpoint) {
      event.preventDefault();
      console.log(`Attempting ${endpoint}...`);
      
      const formData = new FormData(event.target);
      const data = Object.fromEntries(formData);
      console.log(`Form data:`, data);

      try {
        const response = await fetch(`/auth/${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        console.log(`Response status: ${response.status}`);
        console.log(`Response headers:`, response.headers.get('content-type'));
        
        // Read response as text first to check if it's valid
        const responseText = await response.text();
        console.log(`Response text:`, responseText);
        
        // Try to parse JSON
        let result;
        try {
          result = JSON.parse(responseText);
        } catch (parseError) {
          console.error('JSON parse error:', parseError);
          console.error('Invalid JSON received:', responseText.substring(0, 200));
          showFeedback('Server returned invalid data. Check console.', 'error');
          return;
        }
        
        console.log(`Response data:`, result);
        
        if (!response.ok) {
          const errorMsg = result.error || (result.errors && result.errors.join(' ')) || 'Authentication failed.';
          console.error(`Auth error: ${errorMsg}`);
          showFeedback(errorMsg, 'error');
          return;
        }

        token = result.token;
        currentUser = result.user;
        localStorage.setItem('token', token);
        localStorage.setItem('currentUser', JSON.stringify(result.user));
        console.log(`${endpoint} successful! User:`, currentUser);
        updateAuthStatus();
        loadTasks();
        showFeedback(`Successfully ${endpoint === 'login' ? 'logged in' : 'registered'}!`);
      } catch (error) {
        console.error('Auth error:', error);
        showFeedback('Server error: ' + error.message, 'error');
      }
    }

    function switchTab(activeTab, inactiveTab, activeForm, inactiveForm) {
      activeTab.classList.add('active');
      inactiveTab.classList.remove('active');
      activeForm.classList.remove('hidden');
      inactiveForm.classList.add('hidden');
    }

    // Task functions
    function getAuthHeaders() {
      return token ? { 'Authorization': `Bearer ${token}` } : {};
    }

    async function fetchTasks() {
      const params = new URLSearchParams();
      if (searchInput.value.trim()) params.set('search', searchInput.value.trim());
      if (filterStatus.value) params.set('status', filterStatus.value);
      if (sortSelect.value) params.set('sort', sortSelect.value);

      const response = await fetch(`/api/tasks?${params.toString()}`, {
        headers: getAuthHeaders(),
      });
      return response.json();
    }

    function showFeedback(message, type = 'success') {
      feedback.textContent = message;
      feedback.className = `feedback ${type}`;
      if (message) {
        setTimeout(() => { feedback.textContent = ''; feedback.className = 'feedback'; }, 3000);
      }
    }

    function updateTaskCount(count) {
      taskCount.textContent = `${count} task${count === 1 ? '' : 's'} found`;
    }

    function renderTasks(tasks) {
      tasksBody.innerHTML = '';
      updateTaskCount(tasks.length);

      if (tasks.length === 0) {
        tasksBody.innerHTML = '<tr><td colspan="5" class="empty-row">No tasks available.</td></tr>';
        return;
      }

      tasks.forEach(task => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${task.id}</td>
          <td>${task.title}</td>
          <td>${task.description || ''}</td>
          <td>${task.status}</td>
          <td class="actions-cell">
            <button class="small" data-action="edit" data-id="${task.id}">Edit</button>
            <button class="small secondary" data-action="delete" data-id="${task.id}">Delete</button>
          </td>
        `;
        tasksBody.appendChild(row);
      });
    }

    async function loadTasks() {
      if (!token) return;
      try {
        const tasks = await fetchTasks();
        renderTasks(tasks);
      } catch (error) {
        showFeedback('Failed to load tasks.', 'error');
      }
    }

    async function handleFormSubmit(event) {
      event.preventDefault();
      const payload = {
        title: titleInput.value.trim(),
        description: descriptionInput.value.trim(),
        status: statusSelect.value,
      };

      try {
        const url = currentEditId ? `/api/tasks/${currentEditId}` : '/api/tasks';
        const method = currentEditId ? 'PUT' : 'POST';
        const response = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            ...getAuthHeaders(),
          },
          body: JSON.stringify(payload),
        });

        const result = await response.json();
        if (!response.ok) {
          showFeedback(result.error || (result.errors && result.errors.join(' ')) || 'Unable to save task.', 'error');
          return;
        }

        resetF
        loadTasks();
        showFeedback(currentEditId ? 'Task updated successfully.' : 'Task created successfully.');
      } catch (error) {
        showFeedback('Unable to reach the server.', 'error');
      }
    }

    function resetForm() {
      currentEditId = null;
      taskForm.reset();
      statusSelect.value = 'To Do';
      formTitle.textContent = 'Add New Task';
      submitButton.textContent = 'Save Task';
      cancelButton.classList.add('hidden');
    }

    async function handleTaskAction(event) {
      const button = event.target.closest('button');
      if (!button) return;

      const id = button.dataset.id;
      const action = button.dataset.action;

      if (action === 'delete') {
        if (!confirm('Are you sure you want to delete this task?')) return;
        try {
          const response = await fetch(`/api/tasks/${id}`, {
            method: 'DELETE',
            headers: getAuthHeaders(),
          });
          if (response.ok) {
            showFeedback('Task deleted.');
            loadTasks();
          } else {
            showFeedback('Failed to delete task.', 'error');
          }
        } catch (error) {
          showFeedback('Unable to reach the server.', 'error');
        }
      }

      if (action === 'edit') {
        try {
          const response = await fetch(`/api/tasks/${id}`, {
            headers: getAuthHeaders(),
          });
          if (!response.ok) {
            showFeedback('Unable to load task for editing.', 'error');
            return;
          }
          const task = await response.json();
          currentEditId = task.id;
          titleInput.value = task.title;
          descriptionInput.value = task.description || '';
          statusSelect.value = task.status;
          formTitle.textContent = 'Edit Task';
          submitButton.textContent = 'Update Task';
          cancelButton.classList.remove('hidden');
        } catch (error) {
          showFeedback('Unable to reach the server.', 'error');
        }
      }
    }

    function wireEvents() {
      // Auth events
      console.log('Wiring auth events...');
      loginTab.addEventListener('click', () => {
        console.log('Login tab clicked');
        switchTab(loginTab, registerTab, loginForm, registerForm);
      });
      
      registerTab.addEventListener('click', () => {
        console.log('Register tab clicked');
        switchTab(registerTab, loginTab, registerForm, loginForm);
      });
      
      loginForm.addEventListener('submit', (e) => {
        console.log('Login form submitted');
        handleAuthSubmit(e, 'login');
      });
      
      registerForm.addEventListener('submit', (e) => {
        console.log('Register form submitted');
        handleAuthSubmit(e, 'register');
      });
      
      logoutButton.addEventListener('click', () => {
        console.log('Logout clicked');
        logout();
      });

      // Task events
      taskForm.addEventListener('submit', handleFormSubmit);
      tasksBody.addEventListener('click', handleTaskAction);
      searchInput.addEventListener('input', loadTasks);
      filterStatus.addEventListener('change', loadTasks);
      sortSelect.addEventListener('change', loadTasks);
      cancelButton.addEventListener('click', resetForm);
      console.log('✅ All events wired successfully');
    }

    // Initialize
    function init() {
      console.log('🚀 Initializing Task Manager...');
      wireEvents();
      console.log('✅ Events wired');
      
      // Check for stored authentication
      const storedToken = localStorage.getItem('token');
      const storedUser = localStorage.getItem('currentUser');
      
      if (storedToken && isTokenValid(storedToken)) {
        console.log('🔐 Valid token found, restoring session...');
        token = storedToken;
        try {
          currentUser = JSON.parse(storedUser);
          console.log('✅ Session restored for user:', currentUser);
          updateAuthStatus();
          loadTasks();
        } catch (e) {
          console.warn('Invalid stored user data, clearing...');
          logout();
        }
      } else {
        console.log('👤 No valid token found, showing auth forms');
        if (storedToken) {
          console.log('🗑️ Clearing expired token');
          localStorage.removeItem('token');
          localStorage.removeItem('currentUser');
        }
        updateAuthStatus();
      }
    }

    init();
    console.log('✅ Task Manager initialized');

    // Debug function for testing user isolation
    window.debugUserIsolation = function() {
      console.log('🔍 User Isolation Debug Info:');
      console.log('Current User:', currentUser);
      console.log('Token:', token ? token.substring(0, 20) + '...' : 'None');
      console.log('Auth Headers:', getAuthHeaders());
      console.log('LocalStorage token:', localStorage.getItem('token') ? 'Present' : 'None');
      console.log('LocalStorage user:', localStorage.getItem('currentUser'));
      return { currentUser, token: token ? 'Present' : 'None', headers: getAuthHeaders() };
    };
  </script>
</body>
</html>
